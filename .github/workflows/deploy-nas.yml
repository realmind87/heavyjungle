name: Deploy to NAS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nas-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Skip when NAS secrets are missing
        id: nas
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
        run: |
          if [ -z "$NAS_HOST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "NAS secrets not configured — skipping deploy."
          fi

      - name: Deploy over SSH
        if: steps.nas.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            DEPLOY_PATH="${{ secrets.NAS_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/volume1/docker/heavyjungle"; fi
            cd "$DEPLOY_PATH"
            chmod +x scripts/nas-deploy.sh
            ./scripts/nas-deploy.sh
