name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/heavyjungle
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_PUBLIC_URL: http://localhost:9000/uploads
      NEXT_PUBLIC_S3_PUBLIC_URL: http://localhost:9000/uploads
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: uploads
      S3_FORCE_PATH_STYLE: "true"
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Start services for E2E
        run: |
          docker compose up -d postgres redis minio
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U postgres -d heavyjungle >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker compose run --rm minio-init
          npm run db:migrate

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
