# Synology DS918+ + Cloudflare (heavyjungle.com)
#
# NAS 경로:
#   cd /volume1/docker/heavyjungle
#
# 기본 실행:
#   docker compose -f docker-compose.nas.yml up -d --build
#
# Cloudflare Tunnel 함께 실행 (권장):
#   docker compose -f docker-compose.nas.yml --profile cloudflare up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_S3_PUBLIC_URL is baked into the client bundle at build time
        S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://s3.heavyjungle.com/uploads}
    container_name: heavyjungle-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/heavyjungle
      REDIS_URL: redis://redis:6379
      DB_POOL_MAX: "10"
      DB_IDLE_TIMEOUT: "20"
      DB_CONNECT_TIMEOUT: "10"
      CACHE_TTL_SECONDS: "300"
      NODE_OPTIONS: "--max-old-space-size=384"
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: uploads
      # 브라우저 presigned PUT + 공개 읽기 — HTTPS 공개 URL 필수 (예: https://s3.heavyjungle.com/uploads)
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://s3.heavyjungle.com/uploads}
      NEXT_PUBLIC_S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://s3.heavyjungle.com/uploads}
      S3_FORCE_PATH_STYLE: "true"
      APP_URL: ${APP_URL:-https://heavyjungle.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # DB 마이그레이션 (1회성) — ./scripts/nas-migrate.sh
  migrate:
    profiles: ["migrate"]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/heavyjungle
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "test -x node_modules/.bin/drizzle-kit || npm ci --no-fund --no-audit; npm run db:migrate"
    restart: "no"

  # Cloudflare Zero Trust Tunnel (포트포워딩 없이 외부 공개)
  # .env에 CLOUDFLARE_TUNNEL_TOKEN 설정 후 --profile cloudflare 로 실행
  cloudflared:
    profiles: ["cloudflare"]
    image: cloudflare/cloudflared:latest
    container_name: heavyjungle-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: heavyjungle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: heavyjungle
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 스키마는 ./scripts/nas-migrate.sh (drizzle-kit migrate) 로만 적용합니다.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d heavyjungle"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: heavyjungle-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO — S3 호환 객체 스토리지 (아바타 업로드)
  # 콘솔: http://NAS_IP:9001  API: http://NAS_IP:9000
  # Cloudflare Tunnel로 S3 API(9000)를 외부 노출해야 브라우저 presigned PUT 가능
  minio:
    image: minio/minio:latest
    container_name: heavyjungle-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 버킷 생성 + avatars/ 공개 읽기 + CORS (1회성)
  minio-init:
    image: minio/mc:latest
    container_name: heavyjungle-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts/minio-cors.json:/tmp/cors.json:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/uploads &&
      mc anonymous set download local/uploads/avatars &&
      mc anonymous set download local/uploads/comments &&
      mc anonymous set download local/uploads/posts &&
      mc cors set local/uploads /tmp/cors.json &&
      echo 'MinIO bucket uploads ready'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
